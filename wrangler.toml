# DATABASE_URL is a secret, set via `wrangler secret put DATABASE_URL` (done in CI).

# S2/KV host->tenant routing. Create the namespace, then uncomment with its id (leaving this
# commented means the Worker has no TENANTS binding and falls back to DB — current behavior):
#   wrangler kv namespace create TENANTS
# [[kv_namespaces]]
# binding = "TENANTS"
# id = "<namespace-id>"

[observability]
enabled = true
