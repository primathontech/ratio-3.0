name = "ratio-3-0"
main = "apps/edge/worker.ts"
compatibility_date = "2025-06-01"
account_id = "7f06c71e716a0e4a5d38073c16758c60"
workers_dev = true

# DATABASE_URL is a secret, set via `wrangler secret put DATABASE_URL` (done in CI).

# S2/KV host->tenant routing (namespace created 2026-07-15). The edge reads host:{host} from
# KV, DB on miss, then populates (see lookupTenant); the control plane write-throughs on domain
# verify/remove. Binding is native — no token needed at the edge for reads.
[[kv_namespaces]]
binding = "TENANTS"
id = "02d5c63b1a3c42608e0d7b707837b41a"

# S4 D-R8: durable per-tenant metrics sink (cache/stale/error/latency), queryable via the AE SQL
# API. Bounded cardinality — the data point is indexed by tenant (see buildMetricPoint). The code
# is optional (no-op if unbound), so this can be removed if AE isn't enabled on the account.
[[analytics_engine_datasets]]
binding = "METRICS"

[observability]
enabled = true
