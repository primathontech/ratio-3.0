name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ADMIN_URL: postgres://postgres@localhost:5432/postgres
      TEST_DATABASE_URL: postgres://postgres@localhost:5432/s2poc_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Migrate + seed Neon
        run: |
          DATABASE_URL="${{ secrets.DATABASE_URL }}" npm run migrate
          DATABASE_URL="${{ secrets.DATABASE_URL }}" npm run seed
      - name: Deploy Worker
        run: npx wrangler deploy
      - name: Set Worker DATABASE_URL secret
        run: echo "${{ secrets.DATABASE_URL }}" | npx wrangler secret put DATABASE_URL
      # Path B: point the edge Worker at the container origin. Dormant until you set
      # repo var PATH_B=true and add ORIGIN_URL + EDGE_SECRET secrets.
      - name: Point Worker at container origin (path B)
        if: vars.PATH_B == 'true'
        run: |
          echo "${{ secrets.ORIGIN_URL }}"  | npx wrangler secret put ORIGIN_URL
          echo "${{ secrets.EDGE_SECRET }}" | npx wrangler secret put EDGE_SECRET

  # Path B (origin on AWS). Dormant until you set repo variable DEPLOY_AWS=true and
  # add the AWS secrets/vars. Builds the origin image and pushes to ECR; App Runner
  # (configured with auto-deploy on that ECR repo) rolls it out.
  origin-image:
    needs: build
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_AWS == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Build & push origin image to ECR
        run: |
          set -euo pipefail
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="$ACCOUNT.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"
          aws ecr get-login-password | docker login --username AWS --password-stdin "$REGISTRY"
          IMG="$REGISTRY/ratio-3-0-origin"
          docker build -t "$IMG:${{ github.sha }}" -t "$IMG:latest" .
          docker push "$IMG:${{ github.sha }}"
          docker push "$IMG:latest"
          echo "pushed $IMG:latest"
