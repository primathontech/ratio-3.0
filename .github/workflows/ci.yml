name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ADMIN_URL: postgres://postgres@localhost:5432/postgres
      TEST_DATABASE_URL: postgres://postgres@localhost:5432/s2poc_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Migrate + seed Neon
        run: |
          DATABASE_URL="${{ secrets.DATABASE_URL }}" npm run migrate
          DATABASE_URL="${{ secrets.DATABASE_URL }}" npm run seed
      - name: Deploy Worker
        run: npx wrangler deploy
      - name: Set Worker DATABASE_URL secret
        run: echo "${{ secrets.DATABASE_URL }}" | npx wrangler secret put DATABASE_URL
      # Path B: point the edge Worker at the container origin. Dormant until you set
      # repo var PATH_B=true and add ORIGIN_URL + EDGE_SECRET secrets.
      - name: Point Worker at container origin (path B)
        if: vars.PATH_B == 'true'
        run: |
          echo "${{ secrets.ORIGIN_URL }}"  | npx wrangler secret put ORIGIN_URL
          echo "${{ secrets.EDGE_SECRET }}" | npx wrangler secret put EDGE_SECRET

  # Path B (origin on AWS). Dormant until you set repo variable DEPLOY_AWS=true and
  # add the AWS secrets/vars. Builds the origin image and pushes to ECR; App Runner
  # (configured with auto-deploy on that ECR repo) rolls it out.
  origin-image:
    needs: build
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_AWS == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Build & push origin image to ECR
        run: |
          set -euo pipefail
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="$ACCOUNT.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"
          aws ecr get-login-password | docker login --username AWS --password-stdin "$REGISTRY"
          IMG="$REGISTRY/ratio-3-0-origin"
          docker build -t "$IMG:${{ github.sha }}" -t "$IMG:latest" .
          docker push "$IMG:${{ github.sha }}"
          docker push "$IMG:latest"
          echo "pushed $IMG:latest"
      # Roll the running ECS service to the new image. The Express service's task-def
      # pins the image by immutable DIGEST, so --force-new-deployment alone just re-runs
      # the old code. We must register a NEW task-def revision that points at this commit's
      # image (:sha, not :latest — ECS won't reliably re-pull a moving tag) and move the
      # service to it. Dormant until repo var ECS_DEPLOY=true + the IAM user has
      # ecs:Describe*/List*/RegisterTaskDefinition/UpdateService and iam:PassRole.
      - name: Roll ECS to the new image
        if: vars.ECS_DEPLOY == 'true'
        run: |
          set -euo pipefail
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="$ACCOUNT.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"
          NEW_IMAGE="$REGISTRY/ratio-3-0-origin:${{ github.sha }}"
          CLUSTER=$(aws ecs list-clusters --query 'clusterArns[0]' --output text)
          # Roll EVERY service in the cluster (origin + admin-api both run this image with
          # their own command/env). Each keeps its own task-def; we only swap the image tag.
          for SVC in $(aws ecs list-services --cluster "$CLUSTER" --query 'serviceArns[]' --output text); do
            CUR_TD=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SVC" \
              --query 'services[0].deployments[?status==`PRIMARY`].taskDefinition | [0]' --output text)
            echo "rolling ${SVC##*/}: $CUR_TD -> $NEW_IMAGE"
            aws ecs describe-task-definition --task-definition "$CUR_TD" \
              --query 'taskDefinition' --output json \
            | jq --arg img "$NEW_IMAGE" '
                .containerDefinitions[0].image = $img
                | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,
                      .compatibilities,.registeredAt,.registeredBy)' > /tmp/td.json
            NEW_TD=$(aws ecs register-task-definition --cli-input-json file:///tmp/td.json \
              --query 'taskDefinition.taskDefinitionArn' --output text)
            aws ecs update-service --cluster "$CLUSTER" --service "$SVC" \
              --task-definition "$NEW_TD" --force-new-deployment >/dev/null
          done
          echo "waiting for all services to stabilise…"
          aws ecs wait services-stable --cluster "$CLUSTER" \
            --services $(aws ecs list-services --cluster "$CLUSTER" --query 'serviceArns[]' --output text)
          echo "ECS rolled to new task-def + stable"

  # Purge the Cloudflare edge cache after a deploy so cached pages pick up new
  # content. Dormant until repo var PURGE_CACHE=true + token has Zone:CachePurge:Edit.
  # (Interim: purge_everything; exact surrogate-key purge is the S1/ADR-005 refinement.)
  purge:
    needs: [deploy, origin-image]
    if: github.ref == 'refs/heads/main' && vars.PURGE_CACHE == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Purge Cloudflare cache
        run: |
          ZID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=ratiodev.in" -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" | jq -r '.result[0].id')
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZID/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | jq '{success, errors:(.errors|map(.message))}'

  # Admin portal SPA (apps/admin, OFCE-362 slice 3). Built + tested on every push.
  # Deploy to Cloudflare Pages is dormant until repo var DEPLOY_ADMIN_UI=true (needs a
  # Pages project 'ratio-admin', secret CLERK_PUBLISHABLE_KEY, and var ADMIN_API_URL).
  admin-ui:
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/admin/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - name: Build
        env:
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
          VITE_ADMIN_API_URL: ${{ vars.ADMIN_API_URL }}
        run: npm run build
      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main' && vars.DEPLOY_ADMIN_UI == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: '7f06c71e716a0e4a5d38073c16758c60'
        run: npx --yes wrangler pages deploy dist --project-name=ratio-admin --branch=main
