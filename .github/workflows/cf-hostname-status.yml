name: CF hostname status
on:
  workflow_dispatch:
    inputs:
      zone: { required: true, default: ratiodev.in }
      hostname: { required: true }

permissions:
  contents: read

jobs:
  s:
    runs-on: ubuntu-latest
    steps:
      - name: Status
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE: ${{ inputs.zone }}
          HOSTNAME: ${{ inputs.hostname }}
        run: |
          ZID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=$ZONE" -H "Authorization: Bearer $CF_TOKEN" | jq -r '.result[0].id')
          curl -s "https://api.cloudflare.com/client/v4/zones/$ZID/custom_hostnames?hostname=$HOSTNAME" -H "Authorization: Bearer $CF_TOKEN" \
            | jq '.result[0] | {hostname, status, ssl_status:.ssl.status, ssl_method:.ssl.method, ownership_verification, ssl_validation:.ssl.validation_records, verification_errors}'
