name: Onboard merchant

# Manual: onboard a store as DATA (tenant + host mapping + home route) into Neon.
# "Merchant = data" — no deploy, no code change.
on:
  workflow_dispatch:
    inputs:
      id:
        description: tenant id (e.g. t_techalchemist)
        required: true
      name:
        description: store name
        required: true
      host:
        description: hostname (e.g. techalchemist.in)
        required: true
      color:
        description: theme hex
        required: true
        default: '#333333'

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Onboard into Neon
        # Inputs go through env (shell vars), never interpolated into the run script — a
        # ${{ inputs.* }} value like "$(...)" would otherwise execute on the runner, which
        # holds DATABASE_URL. See GitHub's script-injection guidance.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ID: ${{ inputs.id }}
          NAME: ${{ inputs.name }}
          HOST: ${{ inputs.host }}
          COLOR: ${{ inputs.color }}
        run: npx tsx scripts/onboard.ts "$ID" "$NAME" "$HOST" "$COLOR"
