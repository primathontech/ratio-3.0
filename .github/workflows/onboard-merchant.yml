name: Onboard merchant (one-click)

permissions:
  contents: read

# One run = a fully live merchant on a platform subdomain:
#   1. insert tenant + host + home route into Neon (merchant = data)
#   2. create the proxied DNS record (the *.<domain>/* Worker route already serves it)
on:
  workflow_dispatch:
    inputs:
      id:
        description: tenant id (e.g. t_zappy)
        required: true
      name:
        description: store name (e.g. Zappy)
        required: true
      sub:
        description: subdomain slug (e.g. zappy)
        required: true
      color:
        description: theme hex
        required: true
        default: '#333333'
      domain:
        description: platform domain
        required: true
        default: ratiodev.in

jobs:
  onboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # All ${{ inputs.* }} / secrets go through env (shell vars), never interpolated into
      # the run script — otherwise an input like "$(...)" executes on the runner, which
      # holds DATABASE_URL + CLOUDFLARE_API_TOKEN. The JSON body is built with jq so `sub`
      # can't break out of it either.
      - name: 1) Create store (Neon)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ID: ${{ inputs.id }}
          NAME: ${{ inputs.name }}
          SUB: ${{ inputs.sub }}
          DOMAIN: ${{ inputs.domain }}
          COLOR: ${{ inputs.color }}
        run: npx tsx scripts/onboard.ts "$ID" "$NAME" "$SUB.$DOMAIN" "$COLOR"
      - name: 2) Create proxied DNS record
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          SUB: ${{ inputs.sub }}
          DOMAIN: ${{ inputs.domain }}
        run: |
          ZID=$(curl -s "https://api.cloudflare.com/client/v4/zones?name=$DOMAIN" -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result[0].id')
          body=$(jq -nc --arg name "$SUB" '{type:"A",name:$name,content:"192.0.2.1",proxied:true}')
          resp=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/$ZID/dns_records" \
            -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json" \
            --data "$body")
          echo "$resp" | jq '{success, errors:(.errors|map(.message))}'
          # OK if it succeeds OR the record already exists (idempotent re-onboard)
          echo "$resp" | jq -e '.success or (.errors|any(.code==81057 or (.message|test("already exist";"i"))))' >/dev/null
      - name: 3) Done
        env:
          SUB: ${{ inputs.sub }}
          DOMAIN: ${{ inputs.domain }}
        run: echo "✅ https://$SUB.$DOMAIN  (allow a few min for a brand-new subdomain's DNS to propagate)"
