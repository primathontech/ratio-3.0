name: Delete stores

# Manual, destructive: hard-deletes stores from the PRODUCTION database by tenant id
# (atomic purge + zero-residual proof via deleteStore). Run from the Actions tab.
on:
  workflow_dispatch:
    inputs:
      ids:
        description: 'Space-separated tenant ids to delete (e.g. "t_acme t_beta")'
        required: true

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Hard-delete
        # ids via env (not interpolated into the script), then validated to a safe charset
        # before the intentional word-split into multiple args. Blocks shell injection into
        # a destructive, prod-DB command.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          IDS: ${{ inputs.ids }}
        run: |
          case "$IDS" in
            *[!a-zA-Z0-9_\ -]*)
              echo "Refusing: ids may contain only letters, digits, _ - and spaces"; exit 1;;
          esac
          # shellcheck disable=SC2086  # word-split is intentional: multiple ids -> multiple args
          npx tsx scripts/delete-store.ts $IDS
