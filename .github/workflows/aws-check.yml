name: AWS check

# Manual, non-destructive: verifies the AWS keys work and dumps the ECS service's
# image wiring so we can see whether the running task actually tracks ECR :latest.
# Creates nothing. Run from the Actions tab or `gh workflow run`.
on: workflow_dispatch

jobs:
  whoami:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Who am I
        run: aws sts get-caller-identity
      - name: ECS image wiring
        run: |
          set -uo pipefail
          CLUSTER=$(aws ecs list-clusters --query 'clusterArns[0]' --output text)
          SVC=$(aws ecs list-services --cluster "$CLUSTER" --query 'serviceArns[0]' --output text)
          echo "cluster=$CLUSTER"
          echo "service=$SVC"
          echo "--- full service (deployments / taskDefinition / config) ---"
          aws ecs describe-services --cluster "$CLUSTER" --services "$SVC" \
            --query 'services[0].{status:status,taskDefinition:taskDefinition,desired:desiredCount,running:runningCount,deployments:deployments[].{status:status,taskDefinition:taskDefinition,rollout:rolloutState,createdAt:createdAt,updatedAt:updatedAt}}' \
            --output json
          echo "--- ECR :latest digest (what CI just pushed) ---"
          aws ecr describe-images --repository-name ratio-3-0-origin \
            --image-ids imageTag=latest \
            --query 'imageDetails[0].{digest:imageDigest,pushedAt:imagePushedAt}' --output json
          echo "--- running tasks + their image + digest ---"
          for T in $(aws ecs list-tasks --cluster "$CLUSTER" --service-name "${SVC##*/}" --desired-status RUNNING --query 'taskArns' --output text); do
            aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$T" \
              --query 'tasks[0].{startedAt:startedAt,taskDefinition:taskDefinitionArn,image:containers[0].image,imageDigest:containers[0].imageDigest}' --output json
          done
