name: AWS check

# Manual, non-destructive: verifies the AWS keys work and dumps the ECS service's
# image wiring so we can see whether the running task actually tracks ECR :latest.
# Creates nothing. Run from the Actions tab or `gh workflow run`.
on: workflow_dispatch

jobs:
  whoami:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Who am I
        run: aws sts get-caller-identity
      - name: Diagnose admin-api service (events / stopped tasks / logs / health check)
        run: |
          set -uo pipefail
          CLUSTER=arn:aws:ecs:ap-south-1:844310781883:cluster/default
          SVC=$(aws ecs list-services --cluster "$CLUSTER" --query "serviceArns[?contains(@, 'admin-api')] | [0]" --output text)
          echo "admin-api service = $SVC"
          [ "$SVC" = "None" ] && { echo "no admin-api service found"; exit 0; }
          echo "--- service load-balancer container port + task-def port/env/command ---"
          aws ecs describe-services --cluster "$CLUSTER" --services "$SVC" \
            --query 'services[0].loadBalancers' --output json
          TD=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SVC" \
            --query 'services[0].deployments[?status==`PRIMARY`].taskDefinition | [0]' --output text)
          aws ecs describe-task-definition --task-definition "$TD" \
            --query 'taskDefinition.containerDefinitions[0].{image:image,command:command,portMappings:portMappings,env:environment}' --output json
          echo "--- last 12 service events (why tasks fail to place/stabilise) ---"
          aws ecs describe-services --cluster "$CLUSTER" --services "$SVC" \
            --query 'services[0].events[:12].[createdAt,message]' --output text
          echo "--- STOPPED tasks + stop reason + container exit ---"
          for T in $(aws ecs list-tasks --cluster "$CLUSTER" --service-name "${SVC##*/}" --desired-status STOPPED --query 'taskArns[:3]' --output text); do
            aws ecs describe-tasks --cluster "$CLUSTER" --tasks "$T" \
              --query 'tasks[0].{stopped:stoppedReason,task:stoppedAt,containers:containers[].{name:name,exit:exitCode,reason:reason,lastStatus:lastStatus}}' --output json
          done
          echo "--- target group health check paths ---"
          for TG in $(aws elbv2 describe-target-groups --query 'TargetGroups[].TargetGroupArn' --output text); do
            aws elbv2 describe-target-groups --target-group-arns "$TG" \
              --query 'TargetGroups[0].{name:TargetGroupName,port:Port,hcPath:HealthCheckPath,hcPort:HealthCheckPort,matcher:Matcher}' --output json
          done
          echo "--- recent container logs (admin-api log group) ---"
          LG=$(aws logs describe-log-groups --query "logGroups[?contains(logGroupName,'admin-api')].logGroupName | [0]" --output text)
          echo "log group = $LG"
          if [ "$LG" != "None" ] && [ -n "$LG" ]; then
            STREAM=$(aws logs describe-log-streams --log-group-name "$LG" --order-by LastEventTime --descending --max-items 1 --query 'logStreams[0].logStreamName' --output text)
            aws logs get-log-events --log-group-name "$LG" --log-stream-name "$STREAM" --limit 60 \
              --query 'events[].message' --output text
          fi

      - name: ECS service full config (to clone for admin-api)
        run: |
          set -uo pipefail
          CLUSTER=$(aws ecs list-clusters --query 'clusterArns[0]' --output text)
          SVC=$(aws ecs list-services --cluster "$CLUSTER" --query 'serviceArns[0]' --output text)
          echo "cluster=$CLUSTER"
          echo "service=$SVC"
          echo "--- how it's exposed: launchType / network / loadBalancers / registries ---"
          aws ecs describe-services --cluster "$CLUSTER" --services "$SVC" \
            --query 'services[0].{launchType:launchType,capacityProviderStrategy:capacityProviderStrategy,platformVersion:platformVersion,schedulingStrategy:schedulingStrategy,networkConfiguration:networkConfiguration,loadBalancers:loadBalancers,serviceRegistries:serviceRegistries,role:roleArn}' \
            --output json
          echo "--- primary task-def (command / env keys / port / roles / resources) ---"
          TD=$(aws ecs describe-services --cluster "$CLUSTER" --services "$SVC" \
            --query 'services[0].deployments[?status==`PRIMARY`].taskDefinition | [0]' --output text)
          aws ecs describe-task-definition --task-definition "$TD" \
            --query 'taskDefinition.{family:family,cpu:cpu,memory:memory,networkMode:networkMode,execRole:executionRoleArn,taskRole:taskRoleArn,requiresCompat:requiresCompatibilities,container:containerDefinitions[0].{name:name,command:command,portMappings:portMappings,envKeys:environment[].name,logConfiguration:logConfiguration}}' \
            --output json
          echo "--- load balancers on the account (ALB dns = the public URL) ---"
          aws elbv2 describe-load-balancers \
            --query 'LoadBalancers[].{name:LoadBalancerName,dns:DNSName,arn:LoadBalancerArn,type:Type}' --output json 2>/dev/null || echo "no elbv2 access / none"
          echo "--- target groups + listeners (for adding an admin-api rule) ---"
          aws elbv2 describe-target-groups \
            --query 'TargetGroups[].{name:TargetGroupName,port:Port,arn:TargetGroupArn,lb:LoadBalancerArns}' --output json 2>/dev/null || echo "no tg access / none"
